<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tugas 2 Muhammad Fahmi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2 class="text-center text-dark mb-4">Data Pegawai</h2>

      <table class="table table-bordered text-center">
        <!-- THEAD -->
        <thead class="table-info">
          <tr>
            <th>Nama Pegawai</th>
            <th>Umur</th>
            <th>Jabatan</th>
            <th>Status</th>
            <th>Gaji Pokok</th>
            <th>Tunjangan Jabatan</th>
            <th>BPJS</th>
            <th>Tunjangan Keluarga</th>
          </tr>
        </thead>

        <!-- TBODY -->
        <tbody id="dataPegawai" class="bg-white"></tbody>

        <!-- TFOOT -->
        <tfoot class="table-info">
          <tr>
            <th colspan="7">Total Gaji</th>
            <th id="totalGaji"></th>
          </tr>
        </tfoot>
      </table>
    </div>

    <script>
      // Data Pegawai
      let nama = "Dodi Prayodi";
      let umur = 25;
      let jabatan = "Manajer";
      let status = "Menikah";

      // Gaji Pokok
      let gapok;

      if (jabatan == "Manajer") {
        gapok = 15000000;
      } else if (jabatan == "Asisten Manajer") {
        gapok = 10000000;
      } else {
        gapok = 5000000;
      }

      // Tunjangan
      let tunjab = 0.15 * gapok;
      let bpjs = 0.1 * gapok;

      // Tunjangan keluarga
      let tunkel = status == "Menikah" ? 0.2 * gapok : 0;

      // Total
      let total = gapok + tunjab + bpjs + tunkel;

      // Isi tabel
      document.getElementById("dataPegawai").innerHTML = `
      <tr>
      <td>${nama}</td>
      <td>${umur}</td>
      <td>${jabatan}</td>
      <td>${status}</td>
      <td>${gapok}</td>
      <td>${tunjab}</td>
      <td>${bpjs}</td>
      <td>${tunkel}</td>
      </tr>
      `;

      document.getElementById("totalGaji").innerHTML = total;
    </script>
  </body>
</html>
